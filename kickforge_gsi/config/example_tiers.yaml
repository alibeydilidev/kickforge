# KickForge Tier Configuration — Minecraft Example
#
# Maps Kick gift amounts to in-game Minecraft actions.
# Place this file alongside your bot script and load with:
#   engine = TierEngine.from_yaml("tiers.yaml")

game: minecraft

actions:
  chicken_army:
    command: "summon chicken ~ ~2 ~ {CustomName:'\"{{user}}\"'}"
    repeat: 5
    chat_response: "{{user}} spawned a chicken army!"

  creeper_wave:
    command: "summon creeper ~ ~5 ~"
    repeat: 3
    chat_response: "{{user}} unleashed creepers!"

  lightning_strike:
    command: "summon lightning_bolt ~ ~ ~"
    repeat: 1
    chat_response: "{{user}} called down lightning!"

  wither_spawn:
    command: "summon wither ~ ~10 ~"
    repeat: 1
    chat_response: "{{user}} summoned a WITHER! Good luck..."

  tnt_rain:
    command: "summon tnt ~ ~30 ~"
    repeat: 10
    chat_response: "{{user}} made it rain TNT!"

  ender_dragon:
    command: "summon ender_dragon ~ ~20 ~"
    repeat: 1
    chat_response: "{{user}} SUMMONED THE ENDER DRAGON! ({{amount}} kicks)"

  random_mob:
    command: "summon zombie ~ ~2 ~"
    repeat: 1
    chat_response: "{{user}} spawned a zombie!"

tiers:
  - range: [1, 10]
    actions: [chicken_army]
    cooldown: 10

  - range: [11, 50]
    actions: [creeper_wave, lightning_strike]
    cooldown: 30

  - range: [51, 200]
    actions: [wither_spawn, tnt_rain]
    cooldown: 60

  - range: [200, 99999]
    actions: [ender_dragon]
    cooldown: 120

chat_commands:
  "!spawn":
    action: random_mob
    cooldown: 30
    permission: everyone
